name: SEO quality gate

'on':
  pull_request:
  workflow_dispatch:

concurrency:
  group: seo-quality-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      DATABASE_URL: postgresql://test:test@127.0.0.1:5432/aurasveta_test
      BETTER_AUTH_SECRET: test-secret-for-ci-only
      NEXT_PUBLIC_BETTER_AUTH_URL: http://127.0.0.1:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit and integration tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: Start production server for smoke checks
        run: |
          npm run start > /tmp/next-start.log 2>&1 &
          echo $! > /tmp/next-start.pid

      - name: SEO smoke checks
        env:
          SEO_SMOKE_BASE_URL: http://127.0.0.1:3000
          SEO_SMOKE_RETRIES: 30
          SEO_SMOKE_RETRY_DELAY_MS: 1000
          SEO_SMOKE_TIMEOUT_MS: 8000
        run: npm run seo:smoke

      - name: Stop server
        if: always()
        run: |
          if [ -f /tmp/next-start.pid ]; then
            kill $(cat /tmp/next-start.pid) || true
          fi

      - name: Upload server logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: next-start-log
          path: /tmp/next-start.log
