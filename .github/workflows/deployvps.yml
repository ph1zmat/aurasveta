name: Deploy to vps

"on":
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-vps-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.vps_HOST }}
          port: ${{ secrets.vps_PORT || '22' }}
          username: ${{ secrets.vps_USER }}
          key: ${{ secrets.vps_SSH_KEY }}
          script_stop: true
          command_timeout: 150m
          script: |
            set -euo pipefail

            APP_DIR="/var/www/aurasveta/current"
            SERVICE_NAME="aurasveta"
            # Минимум свободного места (KB): 2 GiB
            MIN_FREE_KB=2097152

            cd "$APP_DIR"
            echo "=== Deploy started at: $(date -Is) ==="

            # Важно: останавливаем production-процесс ДО очистки .next.
            # Иначе удаленные файлы могут оставаться занятыми процессом next start,
            # и место на диске фактически не освобождается.
            echo "=== Phase: stop service ($(date -Is)) ==="
            systemctl stop "$SERVICE_NAME" || true

            echo "=== Disk usage before cleanup ==="
            df -h /

            FREE_KB=$(df -Pk / | awk 'NR==2 {print $4}')
            if [ "$FREE_KB" -lt "$MIN_FREE_KB" ]; then
              echo "Low disk space detected (${FREE_KB} KB). Running cleanup..."

              # Артефакты прошлых деплоев/сборок
              rm -rf .next .turbo node_modules node_modules/.cache || true
              rm -f nextbuilduploadtar.gz || true

              # npm cache
              npm cache clean --force || true

              # Обслуживание git-репозитория
              git reflog expire --expire=now --all || true
              git gc --prune=now || true

              echo "=== Disk usage after cleanup ==="
              df -h /
            fi

            FREE_KB=$(df -Pk / | awk 'NR==2 {print $4}')
            if [ "$FREE_KB" -lt "$MIN_FREE_KB" ]; then
              echo "ERROR: still not enough free disk space (${FREE_KB} KB)."
              echo "Please free disk space on vps and rerun workflow."
              exit 1
            fi

            # Берем точное состояние main из GitHub
            echo "=== Phase: git sync ($(date -Is)) ==="
            git fetch --prune --depth=1 origin main
            git reset --hard FETCH_HEAD

            # Загружаем production env до npm ci,
            # так как postinstall запускает prisma generate
            echo "=== Phase: load env ($(date -Is)) ==="
            if [ -f ./.env.production ]; then
              ENV_FILE="./.env.production"
            elif [ -f ./env.production ]; then
              ENV_FILE="./env.production"
            else
              echo "ERROR: neither .env.production nor env.production found in $APP_DIR"
              exit 1
            fi
            echo "Using env file: $ENV_FILE"
            set -a
            . "$ENV_FILE"
            set +a

            # Зависимости + Prisma типы
            echo "=== Phase: npm ci ($(date -Is)) ==="
            rm -rf node_modules
            # В production env обычно NODE_ENV=production, из-за чего npm может
            # не установить devDependencies. Для сборки Next.js dev-пакеты нужны
            # (например, @tailwindcss/postcss для postcssconfig.mjs).
            NODE_OPTIONS=--max-old-space-size=1024 npm ci --include=dev --no-audit --no-fund

            # Анти-OOM: если swap отсутствует, добавляем временный swapfile для build.
            # На маленьких VPS Next.js/TypeScript может завершаться с code 137 (Killed).
            echo "=== Phase: ensure swap ($(date -Is)) ==="
            if [ "$(swapon --noheadings --show=NAME 2>/dev/null | wc -l)" -eq 0 ]; then
              if [ ! -f /swapfile-aurasveta-ci ]; then
                fallocate -l 2G /swapfile-aurasveta-ci || dd if=/dev/zero of=/swapfile-aurasveta-ci bs=1M count=2048
                chmod 600 /swapfile-aurasveta-ci
                mkswap /swapfile-aurasveta-ci
              fi
              swapon /swapfile-aurasveta-ci || true
            fi

            # Production build
            echo "=== Phase: next build ($(date -Is)) ==="
            rm -rf .next
            NODE_ENV=production NODE_OPTIONS=--max-old-space-size=1536 ./node_modules/.bin/next build --webpack

            # Next.js build выполняется от root в рамках CI-SSH, но сервис работает
            # от пользователя aurasveta. Фиксируем права, чтобы убрать EACCES на
            # runtime-кэше (.next/cache/images).
            echo "=== Phase: fix .next permissions ($(date -Is)) ==="
            chown -R aurasveta:www-data .next
            chmod -R u+rwX,g+rwX .next

            # Перезапуск приложения
            echo "=== Phase: restart service ($(date -Is)) ==="
            systemctl restart "$SERVICE_NAME"
            systemctl is-active "$SERVICE_NAME"

            # Пост-деплой smoke checks для SEO-критичных endpoint.
            # Проверяем с локального loopback, чтобы не зависеть от внешнего CDN/сети.
            echo "=== Phase: seo smoke checks ($(date -Is)) ==="
            for path in / /catalog /robots.txt /sitemap.xml /favicon.ico; do
              code="000"
              for attempt in $(seq 1 30); do
                code=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 2 --max-time 8 -H "Host: aurasveta.by" "http://127.0.0.1:3000${path}" || true)
                echo "${path} attempt ${attempt}/30 -> ${code}"
                if [ "$code" -eq 200 ]; then
                  break
                fi
                sleep 2
              done
              if [ "$code" -ne 200 ]; then
                echo "ERROR: SEO smoke check failed for ${path} after retries (last HTTP ${code})"
                journalctl -u "$SERVICE_NAME" -n 80 --no-pager || true
                exit 1
              fi
            done

            echo "=== Deploy finished at: $(date -Is) ==="
