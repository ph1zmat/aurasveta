name: Deploy to vps

'on':
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-vps-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.vps_HOST }}
          port: ${{ secrets.vps_PORT || '22' }}
          username: ${{ secrets.vps_USER }}
          key: ${{ secrets.vps_SSH_KEY }}
          script_stop: true
          command_timeout: 150m
          script: |
            set -euo pipefail

            APP_DIR="/var/www/aurasveta/current"
            SERVICE_NAME="aurasveta"
            # Минимум свободного места (KB): 3 GiB
            MIN_FREE_KB=3145728

            cd "$APP_DIR"
            echo "=== Deploy started at: $(date -Is) ==="

            # Держим сервис запущенным во время sync/install/build,
            # чтобы избежать длительного окна 502.
            echo "=== Phase: service precheck ($(date -Is)) ==="
            systemctl is-active "$SERVICE_NAME" || true

            echo "=== Disk usage before cleanup ==="
            df -h /

            FREE_KB=$(df -Pk / | awk 'NR==2 {print $4}')
            if [ "$FREE_KB" -lt "$MIN_FREE_KB" ]; then
              echo "Low disk space detected (${FREE_KB} KB). Running cleanup..."

              # Щадящая очистка: не трогаем .next/.turbo и node_modules,
              # чтобы не ломать живой сервис до рестарта.
              rm -f nextbuilduploadtar.gz || true

              # npm cache
              npm cache clean --force || true

              # Обслуживание git-репозитория
              git reflog expire --expire=now --all || true
              git gc --prune=now || true

              echo "=== Disk usage after cleanup ==="
              df -h /
            fi

            FREE_KB=$(df -Pk / | awk 'NR==2 {print $4}')
            if [ "$FREE_KB" -lt "$MIN_FREE_KB" ]; then
              echo "ERROR: still not enough free disk space (${FREE_KB} KB)."
              echo "Please free disk space on vps and rerun workflow."
              exit 1
            fi

            # Берем точное состояние main из GitHub
            echo "=== Phase: git sync ($(date -Is)) ==="
            git fetch --prune --depth=1 origin main
            git reset --hard FETCH_HEAD

            # Загружаем production env до npm ci,
            # так как postinstall запускает prisma generate
            echo "=== Phase: load env ($(date -Is)) ==="
            if [ -f ./.env.production ]; then
              ENV_FILE="./.env.production"
            elif [ -f ./env.production ]; then
              ENV_FILE="./env.production"
            else
              echo "ERROR: neither .env.production nor env.production found in $APP_DIR"
              exit 1
            fi
            echo "Using env file: $ENV_FILE"
            set -a
            . "$ENV_FILE"
            set +a

            # Зависимости + Prisma типы
            echo "=== Phase: npm install ($(date -Is)) ==="
            # npm ci удаляет node_modules и может вызвать ошибки у работающего сервиса.
            # Для паттерна без остановки используем npm install с lockfile.
            NODE_OPTIONS=--max-old-space-size=1024 npm install --include=dev --no-audit --no-fund

            # Анти-OOM: доводим суммарный swap минимум до 4 GiB.
            echo "=== Phase: ensure swap ($(date -Is)) ==="
            set +e
            TARGET_SWAP_MB=4096
            TOTAL_SWAP_MB=$( (swapon --bytes --noheadings --show=SIZE 2>/dev/null || true) | awk '{sum+=$1} END {printf "%.0f", sum/1024/1024}')
            TOTAL_SWAP_MB=$(echo "${TOTAL_SWAP_MB:-0}" | tr -dc '0-9')
            [ -z "$TOTAL_SWAP_MB" ] && TOTAL_SWAP_MB=0
            echo "Current total swap: ${TOTAL_SWAP_MB} MB"

            # Fallback для окружений, где swapon --show=SIZE недоступен/возвращает пустой вывод.
            if [ "$TOTAL_SWAP_MB" -eq 0 ] && [ -r /proc/meminfo ]; then
              TOTAL_SWAP_MB=$(awk '/SwapTotal:/ {printf "%.0f", $2/1024}' /proc/meminfo)
              TOTAL_SWAP_MB=${TOTAL_SWAP_MB:-0}
              echo "Fallback swap from /proc/meminfo: ${TOTAL_SWAP_MB} MB"
            fi

            if [ "$TOTAL_SWAP_MB" -lt "$TARGET_SWAP_MB" ]; then
              NEED_SWAP_MB=$((TARGET_SWAP_MB - TOTAL_SWAP_MB))
              [ "$NEED_SWAP_MB" -lt 1024 ] && NEED_SWAP_MB=1024
              EXTRA_SWAP_FILE="/swapfile-aurasveta-ci-extra"
              echo "Need extra swap: ${NEED_SWAP_MB} MB"

              if [ "$(id -u)" -ne 0 ]; then
                echo "WARN: not running as root; skip creating extra swap file"
              else
                if [ ! -f "$EXTRA_SWAP_FILE" ]; then
                  fallocate -l "${NEED_SWAP_MB}M" "$EXTRA_SWAP_FILE" || dd if=/dev/zero of="$EXTRA_SWAP_FILE" bs=1M count="$NEED_SWAP_MB"
                  chmod 600 "$EXTRA_SWAP_FILE"
                  mkswap "$EXTRA_SWAP_FILE"
                fi
                swapon "$EXTRA_SWAP_FILE" || true
              fi
            fi
            set -e

            # Production build
            echo "=== Phase: next build ($(date -Is)) ==="
            # Не чистим .next перед сборкой — сохраняем статический кэш.
            NODE_ENV=production NODE_OPTIONS=--max-old-space-size=2048 ./node_modules/.bin/next build --turbopack

            # Next.js build выполняется от root в рамках CI-SSH, но сервис работает
            # от пользователя aurasveta. Фиксируем права, чтобы убрать EACCES на
            # runtime-кэше (.next/cache/images).
            echo "=== Phase: fix .next permissions ($(date -Is)) ==="
            chown -R aurasveta:www-data .next
            chmod -R u+rwX,g+rwX .next

            # Перезапуск приложения
            echo "=== Phase: restart service ($(date -Is)) ==="
            systemctl restart "$SERVICE_NAME"

            # Ждём переход сервиса в active, чтобы минимизировать 502.
            SERVICE_ACTIVE=0
            for attempt in $(seq 1 30); do
              if systemctl is-active --quiet "$SERVICE_NAME"; then
                SERVICE_ACTIVE=1
                echo "service active on attempt ${attempt}/30"
                break
              fi
              sleep 2
            done
            if [ "$SERVICE_ACTIVE" -ne 1 ]; then
              echo "ERROR: service did not become active in time"
              journalctl -u "$SERVICE_NAME" -n 120 --no-pager || true
              exit 1
            fi

            # Пост-деплой smoke checks для SEO-критичных endpoint.
            # Проверяем с локального loopback, чтобы не зависеть от внешнего CDN/сети.
            echo "=== Phase: seo smoke checks ($(date -Is)) ==="
            for path in / /catalog /robots.txt /sitemap.xml /favicon.ico; do
              code="000"
              for attempt in $(seq 1 30); do
                code=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 2 --max-time 8 -H "Host: aurasveta.by" "http://127.0.0.1:3000${path}" || true)
                echo "${path} attempt ${attempt}/30 -> ${code}"
                if [ "$code" -eq 200 ]; then
                  break
                fi
                sleep 2
              done
              if [ "$code" -ne 200 ]; then
                echo "ERROR: SEO smoke check failed for ${path} after retries (last HTTP ${code})"
                journalctl -u "$SERVICE_NAME" -n 80 --no-pager || true
                exit 1
              fi
            done

            echo "=== Deploy finished at: $(date -Is) ==="
