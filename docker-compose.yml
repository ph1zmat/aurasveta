services:
  minio:
    image: minio/minio:latest
    container_name: aurasveta-minio
    ports:
      - '9000:9000' # S3 API
      - '9001:9001' # Web Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ':9001'
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 5s
      retries: 5

  # Одноразовый контейнер: создаёт бакет и выставляет политику публичного чтения
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin;
        mc mb --ignore-existing local/aurasveta;
        mc anonymous set download local/aurasveta/public;
        exit 0;
      "

volumes:
  minio_data:
